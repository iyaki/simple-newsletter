name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Weekly mutation testing on Monday 6AM
  workflow_dispatch:  # Manual trigger

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, intl, mbstring, ctype
      - name: Composer install
        run: composer install --no-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: NPM install
        run: npm ci
      - name: Mago Lint
        run: composer lint
      - name: PHPStan analysis
        run: composer analyze
      - name: Lefthook validation
        run: npm run validate:lefthook
      - name: Validate OpenAPI spec
        run: vendor/bin/php-openapi validate public/api-spec.yaml

  unit-tests:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, intl, mbstring, ctype
          coverage: xdebug
      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor/
            .phpunit.cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Composer install
        run: composer install --no-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run unit tests with coverage
        run: composer test:coverage

  e2e-tests:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, intl, mbstring, ctype
      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor/
            .phpunit.cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Composer install
        run: composer install --no-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set test environment variables
        run: |
          echo "NEWSLETTER_DB_PATH=${{ github.workspace }}/data/test-e2e.db" >> $GITHUB_ENV
          echo "SECRET_KEY=test-e2e-secret-key-32chars!" >> $GITHUB_ENV
          echo "SERVER_NAME=http://localhost:8080" >> $GITHUB_ENV
          echo "URI_SELF=http://localhost:8080" >> $GITHUB_ENV
      - name: Initialize test database
        run: php -r "require 'vendor/autoload.php'; require 'tests/E2e/bootstrap.php'; init_test_database(getenv('NEWSLETTER_DB_PATH'));"
      - name: Start dev server
        run: php -S localhost:8080 -t public &
      - name: Wait for dev server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start"
          exit 1
      - name: Run e2e tests
        run: composer test:e2e

  mutation-tests:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, intl, mbstring, ctype
          coverage: xdebug
      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor/
            .phpunit.cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Composer install
        run: composer install --no-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run mutation tests
        run: vendor/bin/pest --mutate --min=90

  docker-build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build production image
        run: docker compose -f compose-prod.yaml build
      - name: Run container health check
        run: |
          docker compose -f compose-prod.yaml up -d
          sleep 10
          docker compose -f compose-prod.yaml logs
          docker compose -f compose-prod.yaml down
