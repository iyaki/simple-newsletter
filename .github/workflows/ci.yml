name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Weekly mutation testing on Monday 6AM
  workflow_dispatch:  # Manual trigger

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, intl, mbstring, ctype
      - name: Composer install
        run: composer install --no-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: NPM install
        run: npm ci
      - name: Mago Lint
        run: composer lint
      - name: PHPStan analysis
        run: composer analyze
      - name: Lefthook validation
        run: npm run validate:lefthook
      - name: Validate OpenAPI spec
        run: vendor/bin/php-openapi validate public/api-spec.yaml

  unit-tests:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, intl, mbstring, ctype
          coverage: xdebug
      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor/
            .phpunit.cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Composer install
        run: composer install --no-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run unit tests with coverage
        run: composer test:coverage

  e2e-tests:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, intl, mbstring, ctype
      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor/
            .phpunit.cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Composer install
        run: composer install --no-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run E2E tests
        run: ./scripts/run-e2e-in-devcontainer.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mutation-tests:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, intl, mbstring, ctype
          coverage: xdebug
      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor/
            .phpunit.cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Composer install
        run: composer install --no-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run mutation tests
        run: vendor/bin/pest --mutate --min=90

  docker-build:
    runs-on: ubuntu-latest
    needs: validate
    env:
      SERVER_NAME: localhost:8080
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build production image
        run: docker compose -f compose-prod.yaml build
      - name: Create minimal .env for docker compose
        run: echo "SECRET_KEY=test-key" > .env
