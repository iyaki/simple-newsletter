assert_lefthook_installed: true

pre-commit:
  parallel: true
  jobs:
    - name: mago lint
      glob: "*.php"
      run: vendor/bin/mago lint {staged_files}
      stage_fixed: true

    - name: mago analyze
      glob: "*.php"
      run: vendor/bin/mago analyze {staged_files}
    - name: tests
      glob: "*.php"
      exclude: "tests/E2e/*"
      run: vendor/bin/pest {staged_files}

    - name: lefthook validate
      glob: "lefthook.yml"
      run: npx lefthook validate

pre-push:
  commands:
    full test suite:
      run: composer test:coverage
    # E2E tests moved to CI - too fragile for local pre-push due to infrastructure dependencies
