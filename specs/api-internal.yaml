openapi: 3.0.3
info:
  title: Simple Newsletter — Internal API
  description: |
    Internal (non-public) endpoints used by the system for subscription
    confirmation and cancellation. These are linked from email messages
    and are not intended for direct use by publishers or end-users
    outside the confirmation/cancellation flow.

    The public API spec lives at public/api-spec.yaml.
  version: 1.0.0
servers:
  - url: https://simple-newsletter.com/v1
tags:
  - name: subscriptions
    description: Internal subscription management endpoints
paths:
  /subscriptions/confirmation/:
    get:
      tags:
        - subscriptions
      summary: Confirm a subscription
      description: |
        Confirms a pending subscription. The link is sent via email
        during the subscription flow and includes a signed token that
        authorizes the operation.

        This endpoint is NOT published in the public OpenAPI spec.
      operationId: confirmSubscription
      parameters:
        - name: uri
          in: query
          description: Feed URI the user subscribed to
          required: true
          schema:
            type: string
            format: uri
          example: https://blog.example.com/feed.xml
        - name: email
          in: query
          description: Subscriber email address
          required: true
          schema:
            type: string
            format: email
          example: user@example.com
        - name: token
          in: query
          description: |
            Signed authentication token (HMAC hash of the email).
            Generated by the server when the subscription is created.
          required: true
          schema:
            type: string
          example: abcdef1234567890abcdef1234567890abcdef12
      responses:
        '200':
          description: Subscription confirmed successfully
          headers:
            X-Robots-Tag:
              schema:
                type: string
                example: noindex, nofollow
              description: Prevents search engines from indexing this page
          content:
            text/html:
              schema:
                type: string
                description: HTML confirmation page
              example: "<h1>Subscription confirmed</h1><p>You are now subscribed to Example Feed.</p>"
            application/json:
              schema:
                $ref: '#/components/schemas/JSONResponse'
        '400':
          description: |
            Confirmation failed — invalid or missing parameters, or token
            does not match the email address
          headers:
            X-Robots-Tag:
              schema:
                type: string
                example: noindex, nofollow
          content:
            text/html:
              schema:
                type: string
                description: HTML error page with explanation
            application/json:
              schema:
                $ref: '#/components/schemas/JSONResponse'
  /subscriptions/cancellation/:
    get:
      tags:
        - subscriptions
      summary: Cancel a subscription (unsubscribe)
      description: |
        Cancels an active subscription. The link is included in every
        newsletter email footer and includes a signed token that
        authorizes the operation.

        This endpoint is NOT published in the public OpenAPI spec.
      operationId: cancelSubscription
      parameters:
        - name: uri
          in: query
          description: Feed URI to unsubscribe from
          required: true
          schema:
            type: string
            format: uri
          example: https://blog.example.com/feed.xml
        - name: email
          in: query
          description: Subscriber email address
          required: true
          schema:
            type: string
            format: email
          example: user@example.com
        - name: token
          in: query
          description: |
            Signed authentication token (HMAC hash of the email).
            Must match the token used during subscription.
          required: true
          schema:
            type: string
          example: abcdef1234567890abcdef1234567890abcdef12
      responses:
        '200':
          description: Subscription cancelled successfully
          headers:
            X-Robots-Tag:
              schema:
                type: string
                example: noindex, nofollow
              description: Prevents search engines from indexing this page
          content:
            text/html:
              schema:
                type: string
                description: HTML confirmation page
              example: "<h1>Unsubscribed</h1><p>You have been unsubscribed from Example Feed.</p>"
            application/json:
              schema:
                $ref: '#/components/schemas/JSONResponse'
        '400':
          description: |
            Cancellation failed — invalid or missing parameters, or token
            does not match the email address
          headers:
            X-Robots-Tag:
              schema:
                type: string
                example: noindex, nofollow
          content:
            text/html:
              schema:
                type: string
                description: HTML error page with explanation
            application/json:
              schema:
                $ref: '#/components/schemas/JSONResponse'
components:
  schemas:
    JSONResponse:
      type: object
      description: Standard JSON response envelope for API responses
      properties:
        title:
          type: string
          description: Short human-readable result title
          example: Subscription confirmed
        detail:
          type: string
          description: Additional human-readable detail (may be empty)
          example: You are now subscribed to Example Feed.
      required:
        - title
